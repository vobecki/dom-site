<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliff Edits | AI Photo Editing Studio</title>
    <style>
        :root {
            --gold: #D4AF37;
            --black: #0A0A0A;
            --white: #FFFFFF;
        }
        body { margin: 0; font-family: 'Helvetica', sans-serif; background: var(--black); color: var(--white); }
        
        /* Nav */
        nav { display: flex; justify-content: space-between; padding: 20px 5%; border-bottom: 1px solid var(--gold); align-items: center; }
        .logo { color: var(--gold); font-size: 1.5rem; letter-spacing: 2px; font-weight: bold; }
        .nav-links a { color: var(--white); text-decoration: none; margin-right: 20px; }
        .login-btn { padding: 8px 20px; background: var(--gold); border: none; cursor: pointer; font-weight: bold; border-radius: 5px; }

        /* Hero */
        header { height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 20px; }
        .cta-btn { padding: 15px 40px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; text-decoration: none; color: var(--black); border-radius: 5px; margin-top: 20px; }

        /* Portfolio */
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 50px 5%; }
        .card { border: 1px solid var(--gold); border-radius: 10px; overflow: hidden; }
        .card img { width: 100%; height: 400px; object-fit: cover; display: block; }
        .card-label { padding: 15px; background: #000; color: var(--gold); text-align: center; font-weight: bold; border-top: 1px solid var(--gold); }

        /* WhatsApp Button */
        .wa-float { position: fixed; bottom: 30px; right: 30px; background: #25D366; color: #fff; padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: 2px solid var(--gold); z-index: 1000; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">CLIFF EDITS</div>
        <div class="nav-links">
            <a href="#portfolio">Portfolio</a>
            <button class="login-btn">Login</button>
        </div>
    </nav>

    <header>
        <h1 style="font-size: 3.5rem; margin-bottom: 20px;">Transform Your Photos into<br><span style="color: var(--gold);">Professional Masterpieces</span></h1>
        <a href="https://wa.me/254700000000" class="cta-btn">Start Editing</a>
    </header>

    <section id="portfolio" class="portfolio-grid">
        <div class="card">
            <img src="images/WA0004.jpg" alt="Edit">
            <div class="card-label">Luxury Edit</div>
        </div>
        <div class="card">
            <img src="images/WA0007.jpg" alt="Edit">
            <div class="card-label">Fashion Edit</div>
        </div>
        <div class="card">
            <img src="images/WA0001.jpg" alt="Edit">
            <div class="card-label">Cultural Edit</div>
        </div>
        </section>

    <footer style="text-align: center; padding: 40px; border-top: 1px solid var(--gold);">
        &copy; 2026 Cliff Edits. All Rights Reserved.
    </footer>

    <a href="https://wa.me/254701015044?text=Hi!%20I'd%20like%20to%20order%20an%20edit." class="wa-float">
        WhatsApp Us
    </a>

</body>
</html>
